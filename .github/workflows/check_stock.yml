name: Product Stock Checker

on:
  # This runs the script automatically every 30 minutes
  schedule:
    - cron: '*/30 * * * *'
  # This lets you run it manually with a button click whenever you want to test it
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
    - name: Copy code to GitHub's server
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Tools
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run the Scraper
      env:
        # This safely pulls your secret Discord link we hid in the settings earlier
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: python scraper.py
